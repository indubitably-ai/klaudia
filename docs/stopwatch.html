<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Klaudia Stopwatch</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b0b0f;
        color: #f5f5f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1e293b 0%, #0b0b0f 50%, #050507 100%);
      }

      main {
        width: min(92vw, 720px);
        padding: 48px 32px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.72);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      p {
        margin: 0;
        color: #cbd5e1;
      }

      .timer {
        margin: 28px 0 16px;
        font-size: clamp(3rem, 10vw, 6rem);
        font-weight: 800;
        letter-spacing: 0.08em;
        font-variant-numeric: tabular-nums;
      }

      .started-at {
        margin-top: 18px;
        font-size: 0.95rem;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Klaudia Stopwatch</h1>
      <p>Counting from the configured global launch time.</p>
      <div class="timer" id="timer">00:00:00</div>
      <div class="started-at" id="startedAt"></div>
    </main>
    <script>
      const launchTimestamp = '2026-04-21T21:13:41-07:00';
      const startedAt = new Date(launchTimestamp);
      const timerEl = document.getElementById('timer');
      const startedAtEl = document.getElementById('startedAt');

      function formatElapsed(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        return [hours, minutes, seconds]
          .map((value) => String(value).padStart(2, '0'))
          .join(':');
      }

      function render() {
        const elapsed = Math.max(0, Date.now() - startedAt.getTime());
        timerEl.textContent = formatElapsed(elapsed);
      }

      startedAtEl.textContent = `Global start time: ${startedAt.toLocaleString()} (${launchTimestamp})`;
      render();
      setInterval(render, 250);
    </script>
  </body>
</html>
