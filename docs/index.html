<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Klaudia Pages</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1e293b 0%, #020617 55%, #01030a 100%);
      }

      main {
        width: min(92vw, 760px);
        padding: 48px 32px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        margin: 0 0 24px;
        color: #cbd5e1;
      }

      a {
        display: inline-block;
        padding: 14px 20px;
        border-radius: 999px;
        color: #020617;
        background: #f8fafc;
        text-decoration: none;
        font-weight: 700;
      }

      a:hover {
        background: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Klaudia Pages</h1>
      <p>Live static pages for this repository.</p>
      <a href="./stopwatch.html">Open the stopwatch</a>
    </main>
  </body>
</html>
